name: Weekly content

# Runs every Tuesday at 14:00 UTC (10am ET). Creates one Dev.to draft from
# scripts/content-engine/queue.json, writes social-promotion copy, and
# commits everything back to main. Drafts stay unpublished so a human
# reviews before anything goes live.
on:
  schedule:
    - cron: "0 14 * * TUE"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: content-engine
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate article + social
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          CONTENT_MODEL: ${{ vars.CONTENT_MODEL || 'claude-sonnet-4-5-20250929' }}
        run: node scripts/content-engine/generate.mjs

      - name: Commit updates
        run: |
          git config user.name "pipepost-bot"
          git config user.email "bot@pipepost.dev"
          git add scripts/content-engine/queue.json scripts/content-engine/output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "content: weekly draft ($(date -u +%Y-%m-%d))

          Auto-generated by scripts/content-engine/generate.mjs.
          Review the Dev.to draft and post the social copy when ready."
          git push
